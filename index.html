<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manus 复刻原型 v0.1 Beta</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        MANUS-STYLE
        <span class="badge">v0.1 Beta</span>
      </div>
      <div class="actions">
        <button id="googleAuthBtn" class="secondary">接入 Google 账号</button>
        <button id="simulateBtn" class="primary">模拟自动执行</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel tasks">
        <h2>任务面板</h2>
        <ul id="taskList"></ul>

        <h3>全球大模型厂商</h3>
        <div id="providerList" class="stack-grid"></div>

        <h3>Skills</h3>
        <ul id="skillList" class="pill-list"></ul>

        <h3>通讯平台连接</h3>
        <div id="platformList" class="stack-grid"></div>
      </section>

      <section class="panel chat">
        <h2>Agent 对话</h2>
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="chat-form">
          <input
            id="chatInput"
            type="text"
            placeholder="例如：帮我整理这周的项目进度"
            autocomplete="off"
          />
          <button class="primary" type="submit">发送</button>
        </form>
      </section>

      <section class="panel logs">
        <h2>执行日志</h2>
        <div class="account-box">
          <div class="label">Google 账号状态</div>
          <div id="googleStatus" class="value">未连接</div>
        </div>
        <ol id="logList" class="log-list"></ol>
      </section>
    </main>

    <template id="msgTpl">
      <div class="msg">
        <div class="meta"></div>
        <div class="content"></div>
      </div>
    </template>

    <footer class="footer">当前版本：v0.1 Beta（测试版）</footer>

    <script src="app.js"></script>
  </body>
</html>
